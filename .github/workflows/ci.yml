name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .[dev]

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Import check from a non-editable install
        # Guards against the 2.1.0-style packaging regression, where an
        # editable install hid a missing subpackage in pyproject's package list.
        run: |
          pip uninstall -y blueqat
          pip install .
          cd /tmp && python -c "import blueqat, blueqat.eo, blueqat.cloud, blueqat.macros; print(blueqat.__version__)"

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Run all examples
        run: |
          for f in examples/*.py; do
            echo "=== $f ==="
            MPLBACKEND=Agg python "$f"
          done
